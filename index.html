<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>泰拉地图纪年</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <div class="brand-mark" aria-hidden="true">
      <strong>PRTS</strong>
      <span>SYNTHESIZE INFORMATION</span>
      <em>ANALYSIS&nbsp;&nbsp;OS</em>
    </div>
    <nav class="view-tabs" aria-label="视图">
      <button class="tab active" data-view="map">地图</button>
      <button class="tab" data-view="timeline">时间线</button>
    </nav>

    <section id="mapView" class="view active">
      <div class="map-stage" aria-label="泰拉地区地图">
        <canvas id="terraCanvas" width="2000" height="860" aria-label="泰拉六边形地区地图"></canvas>
      </div>
      <aside class="region-panel">
        <div class="panel-title">
          <div>
            <p class="kicker">Region Timeline</p>
            <h2 id="regionTitle">选择地区</h2>
          </div>
          <button id="clearRegion" class="icon-button" title="关闭" aria-label="关闭">×</button>
        </div>
        <div id="regionTimeline" class="timeline compact"></div>
      </aside>
    </section>

    <section id="timelineView" class="view">
      <section class="timeline-panel" aria-label="总时间线">
        <div class="panel-title timeline-tools">
          <div>
            <p class="kicker">Chronology</p>
            <h2>泰拉纪年</h2>
          </div>
          <input id="searchInput" type="search" placeholder="搜索年份、地区或事件">
          <div class="toolbar" aria-label="筛选">
            <button class="tool-button active" data-filter="all">全部</button>
            <button class="tool-button" data-filter="war">战争</button>
            <button class="tool-button" data-filter="state">国家</button>
            <button class="tool-button" data-filter="culture">文化</button>
            <button class="tool-button" data-filter="modern">近代</button>
          </div>
        </div>
        <div class="timeline" id="timeline"></div>
      </section>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
